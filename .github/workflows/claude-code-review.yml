name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize]

permissions: {}

jobs:
  claude-review:
    # Fork PRs cannot run this workflow: GitHub withholds id-token: write and
    # secrets for pull_request events from forks, so the action's OIDC token
    # exchange fails. Remove this gate once
    # https://github.com/anthropics/claude-code-action/issues/939 is resolved.
    if: github.event.pull_request.head.repo.full_name == github.repository

    runs-on: ubuntu-latest
    environment: claude
    permissions:
      contents: read
      pull-requests: write
      issues: read
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Run Claude Code Review
        id: claude-review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}

          # Prompt for automated review (no @claude mention needed). v1's
          # `prompt` does not auto-inject PR context, so supply it explicitly.
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}

            Please review this pull request and provide feedback on:
            - Code quality and best practices
            - Potential bugs or issues
            - Performance considerations
            - Security concerns
            - Test coverage

            Be constructive and helpful in your feedback.
